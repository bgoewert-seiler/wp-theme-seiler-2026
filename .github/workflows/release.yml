# GitHub Actions Workflow for seiler-2026-theme
# Generated by @seilerinstrument/wp-build-tools
# Project type: theme

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install dependencies
        run: |
          bun install
          composer install --no-interaction --prefer-dist
        working-directory: src

      - name: Run tests
        run: |
          bunx seiler-phpcs src || true
          bunx seiler-phpunit --testdox || true
          bun test || true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: bun install

      - name: Build distribution ZIP
        run: bunx seiler-build --zip

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            # Extract section between this version and next version header
            BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
            if [ -z "$BODY" ]; then
              # Fallback: extract section between this version (without brackets) and next ##
              BODY=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" CHANGELOG.md)
            fi
            echo "$BODY" > /tmp/release-notes.md
          else
            echo "Release $VERSION" > /tmp/release-notes.md
          fi

      - name: Find ZIP file
        id: find_zip
        run: |
          ZIP_FILE=$(ls dist/*.zip | head -1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "ZIP_NAME=$(basename $ZIP_FILE)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: ${{ steps.find_zip.outputs.ZIP_FILE }}
          generate_release_notes: false
          draft: false
          # Auto-mark as prerelease for 0.x versions or any tag with a hyphen (e.g. v1.0.0-beta.1)
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-') }}
