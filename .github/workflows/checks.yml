# GitHub Actions Workflow for seiler-2026-theme
# Generated by @seilerinstrument/wp-build-tools
# Project type: theme

name: Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      wp-env: ${{ steps.check.outputs.wp-env }}
      ddev: ${{ steps.check.outputs.ddev }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "wp-env=$([ -f .wp-env.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "ddev=$([ -f .ddev/config.yaml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: src

      - name: Install dependencies
        run: bun install

      - name: Run PHP syntax check
        run: find src -name "*.php" -not -path "*/vendor/*" -exec php -l {} \;

      - name: Run PHPCS
        run: bunx seiler-phpcs src
        continue-on-error: true

      - name: Run PHPUnit
        run: bunx seiler-phpunit --testdox
        if: hashFiles('src/phpunit.xml') != '' || hashFiles('src/phpunit.xml.dist') != ''

      - name: Build distribution ZIP
        run: bunx seiler-build --zip

      - name: Validate build
        run: bunx seiler-validate-build

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        if: hashFiles('tests/**/*.test.js') != ''

  integration-wp-env:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.wp-env == 'true'
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: src
        if: hashFiles('src/composer.json') != ''

      - name: Install dependencies
        run: bun install

      - name: Start wp-env
        run: bunx --package @wordpress/env wp-env start

      - name: Run PHPUnit (wp-env)
        run: bunx seiler-phpunit-wp --testdox
        if: hashFiles('src/phpunit.xml') != '' || hashFiles('src/phpunit.xml.dist') != ''

      - name: Stop wp-env
        if: always()
        run: bunx --package @wordpress/env wp-env stop

  integration-ddev:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.ddev == 'true'
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup ddev
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Start ddev
        run: ddev start

      - name: Run PHPUnit (ddev)
        run: ddev phpunit --testdox
        if: hashFiles('src/phpunit.xml') != '' || hashFiles('src/phpunit.xml.dist') != ''

      - name: Stop ddev
        if: always()
        run: ddev stop
