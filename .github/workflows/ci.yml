# GitHub Actions Workflow for seiler-2026-theme
# Generated by @seilerinstrument/wp-build-tools
# Project type: theme

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: src

      - name: Configure GitHub Packages auth
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SEILER_CLASSIC_PAT }}

      - name: Install dependencies
        run: npm install

      - name: Run PHP syntax check
        run: find src -name "*.php" -not -path "*/vendor/*" -exec php -l {} \;

      - name: Run PHPCS
        run: bunx seiler-phpcs src
        continue-on-error: true

      - name: Run PHPUnit
        run: bunx seiler-phpunit --testdox
        if: hashFiles('src/phpunit.xml') != '' || hashFiles('src/phpunit.xml.dist') != ''

      - name: Validate build
        run: bunx seiler-validate-build

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Packages auth
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SEILER_CLASSIC_PAT }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: bun test
        if: hashFiles('tests/**/*.test.js') != ''
